<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>JavaScript Tutorial - Todo App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
  </head>

  <body>

    <div class="container">
      <h1>Javascript Todo App</h1>
      <!-- Leon Mercer Week 7 -->

      <div class="row mt-4">
        <div class="col-md-8">
          <ul id="todo-list" class="list-unstyled">
          </ul>
        </div>

        <div class="col-md-4">
          <form onsubmit="return false;">
            <input type="text" class="form-control" id="todoTitle" placeholder="Todo title...">
            <textarea rows="3" class="form-control mt-3" id="todoDesc" placeholder="Todo description..."></textarea>
            <input type="date" class="form-control mt-3" id="todoDeadline">
            <button onclick="newTodo()" class="btn btn-sm btn-primary form-control mt-3">Add</button>
          </form>

          <button onclick="deleteAllTodos()" class="btn btn-sm btn-danger form-control mt-5">Delete All</button>
        </div>
      </div>
    </div>

    <div class="modal" tabindex="-1" role="dialog" id="todoModal">
      <div class="modal-dialog" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Edit Todo</h5>
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>

          <div class="modal-body">
            <label for="edit-title"><strong>Title</strong></label>
            <input type="text" class="form-control" id="edit-title">

            <label for="edit-description" class="mt-3"><strong>Description</strong></label>
            <textarea rows="3" class="form-control" id="edit-description"></textarea>

            <label for="edit-deadline" class="mt-3"><strong>Deadline</strong></label>
            <input type="date" class="form-control" id="edit-deadline">
          </div>

          <div class="modal-footer">
            <button type="button" class="btn btn-primary" onclick="saveTodoChanges()">Save changes</button>
            <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZF5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>

    <script>
      var currentEditID = null;
      var json_data = JSON.parse(localStorage.getItem('json_data'));

      if (json_data) {
        json_data.forEach(element => {
          if (element) {
            newTodo(element.title, element.description, element.deadline, element.id);
          }
        });
      }

      registerEventListeners();

      function registerEventListeners() {
        var deleteButtons = document.querySelectorAll(".delete");
        deleteButtons.forEach(function(button) {
          button.onclick = function() {
            var todoID = this.parentNode.getAttribute('data-id');
            deleteTodo(todoID);
          };
        });

        var todoLinks = document.querySelectorAll("a[data-target='#todoModal']");
        todoLinks.forEach(function(link) {
          link.onclick = function() {
            var todoID = this.parentNode.getAttribute('data-id');
            var currentTodo = getTodo(todoID);

            currentEditID = todoID;
            document.getElementById("edit-title").value = currentTodo.title || "";
            document.getElementById("edit-description").value = currentTodo.description || "";
            document.getElementById("edit-deadline").value = currentTodo.deadline || "";
          };
        });
      }

      function getTodo(id) {
        var json_temp = JSON.parse(localStorage.getItem('json_data'));
        return json_temp[id];
      }

      function deleteTodo(todoID) {
        var todoElement = document.querySelector("li[data-id='" + todoID + "']");
        if (todoElement) {
          todoElement.style.display = "none";
        }

        var json_temp = JSON.parse(localStorage.getItem('json_data'));
        delete json_temp[todoID];
        localStorage.setItem('json_data', JSON.stringify(json_temp));
      }

      function newTodo(todoTitle, todoDesc, todoDeadline, todoID) {
        if (!todoTitle && todoID === undefined) {
          todoTitle = document.getElementById("todoTitle").value;
          todoDesc = document.getElementById("todoDesc").value;
          todoDeadline = document.getElementById("todoDeadline").value;

          if (todoTitle) {
            todoID = storeTodoLocal(todoTitle, todoDesc, todoDeadline);
          }
        }

        if (todoTitle) {
          var deadlineText = todoDeadline ? " - Deadline: " + todoDeadline : " - No deadline";
          var todoHTML = '<a href="#" data-toggle="modal" data-target="#todoModal">' + todoTitle + '</a>' +
                         '<span class="ml-2 text-muted">' + deadlineText + '</span>' +
                         ' <a href="#" class="btn btn-sm btn-danger m-1 delete">Delete</a>';

          var todoList = document.getElementById("todo-list");
          var newTodoElement = document.createElement("li");
          newTodoElement.setAttribute("data-id", todoID);
          newTodoElement.className = "mb-2";
          newTodoElement.innerHTML = todoHTML;
          todoList.appendChild(newTodoElement);

          registerEventListeners();

          document.getElementById("todoTitle").value = "";
          document.getElementById("todoDesc").value = "";
          document.getElementById("todoDeadline").value = "";
        }
      }

      function storeTodoLocal(todoTitle, todoDesc, todoDeadline) {
        var json_temp = JSON.parse(localStorage.getItem('json_data'));

        if (!json_temp) {
          json_temp = [];
        }

        var todoID = json_temp.length;

        json_temp.push({
          "id": todoID,
          "title": todoTitle,
          "description": todoDesc,
          "deadline": todoDeadline,
          "completed": false
        });

        localStorage.setItem('json_data', JSON.stringify(json_temp));
        return todoID;
      }

      function saveTodoChanges() {
        var json_temp = JSON.parse(localStorage.getItem('json_data'));

        if (json_temp && json_temp[currentEditID]) {
          json_temp[currentEditID].title = document.getElementById("edit-title").value;
          json_temp[currentEditID].description = document.getElementById("edit-description").value;
          json_temp[currentEditID].deadline = document.getElementById("edit-deadline").value;

          localStorage.setItem('json_data', JSON.stringify(json_temp));

          var todoItem = document.querySelector("li[data-id='" + currentEditID + "']");
          if (todoItem) {
            var updatedTitle = json_temp[currentEditID].title;
            var updatedDeadline = json_temp[currentEditID].deadline
              ? " - Deadline: " + json_temp[currentEditID].deadline
              : " - No deadline";

            todoItem.innerHTML =
              '<a href="#" data-toggle="modal" data-target="#todoModal">' + updatedTitle + '</a>' +
              '<span class="ml-2 text-muted">' + updatedDeadline + '</span>' +
              ' <a href="#" class="btn btn-sm btn-danger m-1 delete">Delete</a>';

            registerEventListeners();
          }

          $('#todoModal').modal('hide');
        }
      }

      function deleteAllTodos() {
        if (confirm("Are you sure you want to delete all of your Todos?")) {
          localStorage.removeItem('json_data');
          document.getElementById("todo-list").innerHTML = "";
        }
      }
    </script>
  </body>
</html>
